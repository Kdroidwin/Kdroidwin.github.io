<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リンクカード一覧</title>
    <style>
        /* カードコンテナのスタイリング */
        .cards-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
        }

        /* 共通のリンクカードのスタイル */
        .link-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 300px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-decoration: none;
            color: #333;
            background-color: #f9f9f9;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 20px; /* カード間の間隔 */
        }

        .link-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .link-card h2 {
            font-size: 1.5em;
            margin: 0;
            color: #0070f3;
        }

        .link-card p {
            margin: 10px 0 0;
            font-size: 1em;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="cards-container">
        <!-- PipePipe Project リンクカード -->
        <a href="https://github.com/InfinityLoop1308/PipePipe" target="_blank" class="link-card">
            <h2>PipePipe Project</h2>
            <p>GitHubでPipePipeの詳細を確認する</p>
        </a>

        <!-- Tubular Project リンクカード -->
        <a href="https://github.com/polymorphicshade/Tubular" target="_blank" class="link-card">
            <h2>Tubular Project</h2>
            <p>GitHubでTubularの詳細を確認する</p>
        </a>
    </div>
</body>
</html>
