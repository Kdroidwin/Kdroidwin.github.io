<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kdroidwin Home</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            display: flex;
            height: 100vh; /* サイドバーをページの下まで伸ばす */
        }

        .sidebar {
            width: 250px;
            background-color: #f4f4f4;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease; /* アニメーション効果 */
        }

        .sidebar.collapsed {
            transform: translateX(-100%); /* サイドバーを隠す */
        }

        .sidebar h2 {
            font-size: 1.5em;
        }

        .sidebar ul {
            list-style-type: none;
            padding: 0;
        }

        .sidebar ul li {
            margin: 10px 0;
        }

        .sidebar a {
            text-decoration: none;
            color: #333;
        }

        .sidebar a:hover {
            text-decoration: underline;
        }

        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto; /* コンテンツが多い場合にスクロール可能に */
        }

        #toggle-sidebar {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar" id="sidebar">
            <h2>contact</h2>
            <ul>
                <li><a href="https://twitter.com/Kdroidwin1" target="_blank">Twitter</a></li>
                <li><a href="https://kdroidwin.hatenablog.com" target="_blank">Blog</a></li>
                <li><a href="https://github.com/kdroidwin" target="_blank">GitHub</a></li>
                <li><a href="mailto:kdroidwin@gmail.com">mail</a></li>
            </ul>
        </aside>
        <main class="content">
            <button id="toggle-sidebar">☰</button>
            <h1>Kdroidwin Home</h1>
            <div class="toc">
                <h2>目次</h2>
                <ul>
                    <li><a href="#section1">セクション1</a></li>
                    <li><a href="#section2">セクション2</a></li>
                    <li><a href="#section3">セクション3</a></li>
                </ul>
            </div>
            <section id="section1">
                <h2>セクション1</h2>
                <p>ここにセクション1の内容が入ります。</p>
            </section>
            <section id="section2">
                <h2>セクション2</h2>
                <p>ここにセクション2の内容が入ります。</p>
            </section>
            <section id="section3">
                <h2>セクション3</h2>
                <p>ここにセクション3の内容が入ります。</p>
            </section>
        </main>
    </div>
    <script>
        // script.js
        document.addEventListener('DOMContentLoaded', function() {
            const toggleSidebarButton = document.getElementById('toggle-sidebar');
            const sidebar = document.getElementById('sidebar');

            // サイドバーの表示/非表示を切り替える
            toggleSidebarButton.addEventListener('click', function() {
                sidebar.classList.toggle('collapsed');
            });
        });
    </script>
</body>
</html>
