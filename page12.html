<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kdroidwin Home</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212; /* ダークモードの背景色 */
            color: #ffffff; /* ダークモードの文字色 */
        }

        .container {
            display: flex;
            height: 100vh; /* サイドバーをページの下まで伸ばす */
            position: relative; /* 相対位置を設定 */
        }

        .sidebar {
            width: 250px;
            background-color: #1e1e1e; /* ダークモードのサイドバー色 */
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.5);
            position: absolute; /* 絶対位置を設定 */
            left: 0; /* 左に配置 */
            top: 0; /* 上に配置 */
            height: 100%; /* 高さを100%に設定 */
            transform: translateX(-100%); /* 初期状態で隠す */
            transition: transform 0.3s ease; /* アニメーション効果 */
        }

        .sidebar.active {
            transform: translateX(0); /* サイドバーを表示 */
        }

        .sidebar h2 {
            font-size: 1.5em;
        }

        .sidebar ul {
            list-style-type: none;
            padding: 0;
        }

        .sidebar ul li {
            margin: 10px 0;
        }

        .sidebar a {
            text-decoration: none;
            color: #ffffff; /* ダークモードのリンク色 */
        }

        .sidebar a:hover {
            text-decoration: underline;
        }

        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto; /* コンテンツが多い場合にスクロール可能に */
            transition: margin-left 0.3s ease; /* アニメーション効果 */
        }

        #toggle-sidebar {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            margin-right: 10px; /* タイトルとの間にスペースを追加 */
            color: #ffffff; /* ダークモードのボタン色 */
        }

        .header {
            display: flex;
            align-items: center; /* 垂直方向に中央揃え */
        }

        /* スマホ版のスタイル */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%); /* スマホ版では初期状態で隠す */
            }
            .sidebar.active {
                transform: translateX(0); /* スマホ版でサイドバーを表示 */
            }
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <aside class="sidebar" id="sidebar">
            <h2>contact</h2>
            <ul>
                <li><a href="https://twitter.com/Kdroidwin1" target="_blank">Twitter</a></li>
                <li><a href="https://kdroidwin.hatenablog.com" target="_blank">Blog</a></li>
                <li><a href="https://github.com/kdroidwin" target="_blank">GitHub</a></li>
                <li><a href="mailto:kdroidwin@gmail.com">mail</a></li>
            </ul>
        </aside>
        <main class="content" id="content">
            <div class="header">
                <button id="toggle-sidebar">☰</button>
                <h1>Kdroidwin Home</h1>
            </div>

                <h2>目次</h2>
